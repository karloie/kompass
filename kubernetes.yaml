apiVersion: v1
kind: Namespace
metadata:
  name: kompass
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kompass
  namespace: kompass
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kompass-read-only
rules:
  # Kompass redacts secret contents. Operators can still narrow RBAC if they
  # prefer to hide secret-backed nodes and related relationships entirely.
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/version"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kompass-read-only
subjects:
  - kind: ServiceAccount
    name: kompass
    namespace: kompass
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kompass-read-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kompass
  namespace: kompass
  labels:
    app.kubernetes.io/name: kompass
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kompass
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kompass
    spec:
      serviceAccountName: kompass
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
      containers:
        - name: kompass
          image: karloie/kompass:latest
          imagePullPolicy: Always
          args:
            - --service
            - 0.0.0.0:8080
            - --namespace
            - kompass
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: KOMPASS_K8S_TIMEOUT
              value: 30s
            # Set to the in-cluster service address when deployed in Kubernetes.
            - name: KOMPASS_HUBBLE_ADDR
              value: hubble-relay.kube-system.svc.cluster.local:80

          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /api/readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: kompass
  namespace: kompass
  labels:
    app.kubernetes.io/name: kompass
spec:
  selector:
    app.kubernetes.io/name: kompass
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
