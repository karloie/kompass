apiVersion: v1
kind: Namespace
metadata:
  name: kompass
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kompass
  namespace: kompass
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kompass-read-only
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["get", "list", "watch"]
- nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*", "/version"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kompass-read-only
subjects:
- kind: ServiceAccount
  name: kompass
  namespace: kompass
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kompass-read-only
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kompass
  namespace: kompass
  labels:
    app.kubernetes.io/name: kompass
    app.kubernetes.io/component: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kompass
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kompass
    spec:
      serviceAccountName: kompass
      containers:
      - name: kompass
        image: karloie/kompass:latest
        imagePullPolicy: IfNotPresent
        args:
        - --service
        - 0.0.0.0:8080
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: KOMPASS_K8S_TIMEOUT
          value: 30s
        readinessProbe:
          httpGet:
            path: /api/readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /api/healthz
            port: http
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: kompass
  namespace: kompass
  labels:
    app.kubernetes.io/name: kompass
spec:
  selector:
    app.kubernetes.io/name: kompass
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
  type: ClusterIP
