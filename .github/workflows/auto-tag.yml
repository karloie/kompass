name: Auto Tag Release

on:
  push:
    branches:
      - main
    paths:
      - 'cmd/**'
      - 'pkg/**'
      - 'go.mod'
      - 'go.sum'
      - 'Containerfile'
      - '.goreleaser.yaml'
      - '.goreleaser.yml'

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, '[no release]') }}
    concurrency:
      group: auto-tag-main
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine next version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || true)

          if [[ -n "$latest_tag" ]]; then
            commit_range="$latest_tag..HEAD"
            base_version="${latest_tag#v}"
          else
            commit_range="HEAD"
            base_version="0.0.0"
            latest_tag="none"
          fi

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"

          commit_messages=$(git log --format=%s "$commit_range")
          if [[ -z "$commit_messages" ]]; then
            echo "No commits since $latest_tag; skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          bump="patch"

          # Conventional Commits: breaking change marker in header (type(scope)!:) or body/footer.
          if git log "$commit_range" --format=%B | grep -Eq 'BREAKING CHANGE|^[a-zA-Z]+(\([^)]*\))?!:'; then
            bump="major"
          elif echo "$commit_messages" | grep -Eq '^feat(\([^)]*\))?:'; then
            bump="minor"
          fi

          version=$base_version
          IFS='.' read -r major minor patch <<< "$version"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          case "$bump" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          echo "bump=$bump" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: steps.version.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          next_tag='${{ steps.version.outputs.next_tag }}'

          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag $next_tag already exists; skipping"
            exit 0
          fi

          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"

      - name: Summary
        if: steps.version.outputs.should_release == 'true'
        run: |
          echo "Latest tag: ${{ steps.version.outputs.latest_tag }}"
          echo "Bump type:  ${{ steps.version.outputs.bump }}"
          echo "New tag:    ${{ steps.version.outputs.next_tag }}"
