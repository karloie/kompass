name: Build and Publish GoReleaser Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (example: v0.0.14). Required for manual runs.'
        required: true
        type: string
      publish:
        description: 'Publish artifacts (true) or run dry-run validation only (false)'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  goreleaser:
    concurrency:
      group: goreleaser-${{ github.ref }}
      cancel-in-progress: false
    uses: karloie/gh-workflows/.github/workflows/goreleaser.yml@main
    with:
      event_name: ${{ github.event_name }}
      tag: ${{ inputs.tag }}
      publish: ${{ inputs.publish }}
      tool_ref: main
    secrets:
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}