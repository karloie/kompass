name: Build and Push Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build and push (example: v0.0.13). Required for manual runs.'
        required: true
        type: string
  push:
    tags: ['v*']

jobs:
  build:
    concurrency:
      group: docker-${{ github.ref }}
      cancel-in-progress: true
    uses: karloie/gh-workflows/.github/workflows/docker.yml@main
    with:
      image: karloie/kompass
      event_name: ${{ github.event_name }}
      tag: ${{ inputs.tag }}
      tool_ref: main
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
