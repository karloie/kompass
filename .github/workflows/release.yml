name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for manual release'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  manual-new-release:
    runs-on: ubuntu-latest
    concurrency:
      group: manual-release-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Compute next tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          case "${{ inputs.bump }}" in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          next_tag="v${major}.${minor}.${patch}"
          if git rev-parse "$next_tag" >/dev/null 2>&1; then
            echo "Tag $next_tag already exists; refusing to overwrite"
            exit 1
          fi

          echo "latest_tag=$latest_tag" >> "$GITHUB_OUTPUT"
          echo "next_tag=$next_tag" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          set -euo pipefail
          next_tag='${{ steps.tag.outputs.next_tag }}'
          git tag -a "$next_tag" -m "Release $next_tag"
          git push origin "$next_tag"

      - name: Checkout new tag
        run: |
          git checkout "${{ steps.tag.outputs.next_tag }}"

      - name: Resolve Docker image tags
        id: docker_tags
        shell: bash
        run: |
          set -euo pipefail

          tag='${{ steps.tag.outputs.next_tag }}'
          version=${tag#v}
          IFS='.' read -r major minor patch <<< "$version"

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "major_minor=$major.$minor" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: karloie/kompass
          tags: |
            type=raw,value=${{ steps.docker_tags.outputs.version }}
            type=raw,value=${{ steps.docker_tags.outputs.major_minor }}
            type=sha,prefix=sha-

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}

      - name: Summary
        run: |
          echo "Bumped from: ${{ steps.tag.outputs.latest_tag }}"
          echo "Released new: ${{ steps.tag.outputs.next_tag }}"
          echo "Published Docker tags:"
          echo "  - karloie/kompass:${{ steps.docker_tags.outputs.version }}"
          echo "  - karloie/kompass:${{ steps.docker_tags.outputs.major_minor }}"
          echo "  - karloie/kompass:sha-${GITHUB_SHA::7}"
