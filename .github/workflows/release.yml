name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump for manual release (patch, minor, major)'
        required: false
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  pull-requests: read

jobs:
  manual-new-release:
    concurrency:
      group: manual-release-main
      cancel-in-progress: false
    uses: karloie/gh-workflows/.github/workflows/release.yml@main
    with:
      image: karloie/kompass
      event_name: ${{ github.event_name }}
      bump: ${{ inputs.bump }}
      tool_ref: main
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
