name: Re-release latest tag

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  rerelease:
    concurrency:
      group: rerelease-latest
      cancel-in-progress: false
    uses: karloie/shipkit/.github/workflows/release.yml@v0.0.18
    with:
      image: karloie/kompass
      mode: rerelease
      tool_ref: v0.0.18
      node_version: '22'
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
